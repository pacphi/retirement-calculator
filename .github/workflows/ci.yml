name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # pnpm must be installed BEFORE setup-node so its `cache: pnpm` lookup
      # finds the pnpm binary. Version is resolved from the packageManager
      # field in package.json (pnpm@11.5.2) — no `version:` input needed.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Lint markdown
        run: pnpm lint:md

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Install the lychee binary so the `links` script (offline, local-file
      # link checking) can run. Pinned for reproducible CI; bump deliberately.
      - name: Install lychee
        run: |
          LYCHEE_VERSION=v0.24.2
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --strip-components=1 lychee-x86_64-unknown-linux-gnu/lychee
          sudo install -m 0755 lychee /usr/local/bin/lychee
          rm -f lychee
          lychee --version

      # The `links` script defaults SSL_CERT_FILE to the macOS path
      # (/etc/ssl/cert.pem); point it at the Ubuntu CA bundle so lychee can
      # build its request client even though the check itself runs --offline.
      - name: Check links
        run: pnpm links
        env:
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
